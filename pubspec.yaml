name: webview_master_app
description: A feature-rich Flutter WebView application with splash screen, onboarding, and permissions.
publish_to: 'none'
# version: 1.0.1+2
# version: 1.0.1+5
# version: 1.0.3+11
version: 4.3.9+21

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter: 
    sdk: flutter
 
  # WebView
  flutter_inappwebview: ^6.0.0
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # Network Connectivity
  connectivity_plus: ^6.0.3
  
  # HTTP Client
  http: ^1.2.0
  
  # UI
  cupertino_icons: ^1.0.2

  # Local Notification
  flutter_local_notifications: ^19.5.0
  google_mobile_ads: ^5.2.0
  
  # Firebase Cloud Messaging
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  url_launcher: ^6.3.2
  dio: ^5.9.0
  open_file: ^3.5.10
  path_provider: ^2.1.5
  change_app_package_name: ^1.5.0
  share_plus: ^10.1.4
  facebook_app_events: ^0.30.3
  firebase_analytics: ^11.6.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^3.0.0
  
  # App Icon Generator
  flutter_launcher_icons: ^0.13.1

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/onboarding/

  # Fonts (optional - uncomment to add custom fonts)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700
